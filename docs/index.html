<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="AI 기반 한국 주식시장 일일 분석 대시보드">
<title>AI 금융 분석 대시보드</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a0e17'/%3E%3Cpolyline points='4,24 10,14 16,18 22,8 28,12' fill='none' stroke='%2306b6d4' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='28' cy='12' r='2' fill='%2310b981'/%3E%3C/svg%3E">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ─── Reset & Base ─────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:           #0a0e17;
  --surface:      #111827;
  --surface-hi:   #162032;
  --surface-glass: rgba(17, 24, 39, 0.7);
  --border:       rgba(6,182,212,0.12);
  --border-hi:    rgba(6,182,212,0.28);
  --cyan:         #06b6d4;
  --cyan-dim:     rgba(6,182,212,0.15);
  --green:        #10b981;
  --green-dim:    rgba(16,185,129,0.15);
  --red:          #ef4444;
  --red-dim:      rgba(239,68,68,0.15);
  --amber:        #f59e0b;
  --amber-dim:    rgba(245,158,11,0.15);
  --orange:       #f97316;
  --orange-dim:   rgba(249,115,22,0.15);
  --text:         #cbd5e1;
  --text-muted:   #475569;
  --text-bright:  #f1f5f9;
  --font: -apple-system, BlinkMacSystemFont, "Noto Sans KR", "Malgun Gothic", sans-serif;
  --font-mono: "SF Mono", "Fira Code", "Consolas", "Menlo", monospace;
  --radius:  10px;
  --radius-sm: 6px;
  --radius-lg: 14px;
  --shadow:  0 4px 24px rgba(0,0,0,0.4);
  --shadow-glow: 0 0 30px rgba(6,182,212,0.08);
  --row-even: rgba(255,255,255,0.02);
}

html { font-size: 21px; scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* Subtle grid texture */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(6,182,212,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(6,182,212,0.02) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

/* ─── Animations ──────────────────────────────────────── */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-20px); }
  to   { opacity: 1; transform: translateX(0); }
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.4; transform: scale(0.7); }
}

@keyframes spin { to { transform: rotate(360deg); } }

@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

@keyframes gaugeGrow {
  from { width: 0; }
}

.anim-item {
  opacity: 0;
  animation: fadeInUp 0.5s ease forwards;
}

.anim-item:nth-child(1) { animation-delay: 0.05s; }
.anim-item:nth-child(2) { animation-delay: 0.1s; }
.anim-item:nth-child(3) { animation-delay: 0.15s; }
.anim-item:nth-child(4) { animation-delay: 0.2s; }
.anim-item:nth-child(5) { animation-delay: 0.25s; }
.anim-item:nth-child(6) { animation-delay: 0.3s; }

/* ─── Layout ───────────────────────────────────────────── */
.shell {
  position: relative;
  z-index: 1;
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 20px 48px;
}

/* ─── Glass Card Base ─────────────────────────────────── */
.glass-card {
  background: var(--surface-glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  transition: border-color 0.25s, box-shadow 0.25s;
}

.glass-card:hover {
  border-color: var(--border-hi);
  box-shadow: var(--shadow), var(--shadow-glow);
}

/* ─── Header ───────────────────────────────────────────── */
.header {
  padding: 24px 0 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
  animation: fadeIn 0.4s ease;
}

.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.brand-icon {
  width: 42px; height: 42px;
  background: var(--cyan-dim);
  border: 1px solid var(--border-hi);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.brand-icon svg { width: 22px; height: 22px; }

.brand-title {
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: -0.02em;
  line-height: 1.2;
}

.brand-sub {
  font-size: 0.72rem;
  color: var(--cyan);
  font-family: var(--font-mono);
  letter-spacing: 0.08em;
  margin-top: 2px;
}

.header-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}

.live-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(16,185,129,0.1);
  border: 1px solid rgba(16,185,129,0.3);
  color: var(--green);
  font-size: 0.7rem;
  font-family: var(--font-mono);
  font-weight: 600;
  letter-spacing: 0.12em;
  padding: 4px 12px;
  border-radius: 20px;
}

.live-dot {
  width: 6px; height: 6px;
  background: var(--green);
  border-radius: 50%;
  animation: pulse-dot 2s infinite;
}

.meta-date {
  font-size: 0.82rem;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

.meta-time {
  font-size: 0.72rem;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

/* ─── Section Label ────────────────────────────────────── */
.section-label {
  font-size: 0.72rem;
  font-family: var(--font-mono);
  font-weight: 600;
  letter-spacing: 0.14em;
  color: var(--cyan);
  text-transform: uppercase;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.section-wrap {
  margin-bottom: 36px;
}

/* ─── Insights Section ─────────────────────────────────── */
.insights-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 14px;
}

.insight-card {
  padding: 18px;
  position: relative;
  overflow: hidden;
}

.insight-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
}

.insight-card.type-warning::before { background: linear-gradient(90deg, var(--amber), transparent); }
.insight-card.type-opportunity::before { background: linear-gradient(90deg, var(--green), transparent); }
.insight-card.type-risk::before { background: linear-gradient(90deg, var(--red), transparent); }
.insight-card.type-info::before { background: linear-gradient(90deg, var(--cyan), transparent); }

.insight-icon {
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 10px;
  font-size: 1.1rem;
}

.insight-icon.warning { background: var(--amber-dim); }
.insight-icon.opportunity { background: var(--green-dim); }
.insight-icon.risk { background: var(--red-dim); }
.insight-icon.info { background: var(--cyan-dim); }

.insight-title {
  font-size: 0.88rem;
  font-weight: 700;
  color: var(--text-bright);
  margin-bottom: 6px;
  line-height: 1.3;
}

.insight-desc {
  font-size: 0.78rem;
  color: var(--text);
  line-height: 1.5;
}

/* ─── Macro Cards ──────────────────────────────────────── */
.macro-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 14px;
}

.macro-card {
  padding: 18px;
  position: relative;
  overflow: hidden;
}

.macro-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--cyan), transparent);
  opacity: 0.6;
}

.macro-icon {
  width: 34px; height: 34px;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 12px;
  font-size: 1rem;
}

.macro-icon.cycle { background: var(--cyan-dim); }
.macro-icon.rate  { background: var(--green-dim); }
.macro-icon.infl  { background: var(--amber-dim); }

.macro-label {
  font-size: 0.72rem;
  font-family: var(--font-mono);
  color: var(--text-muted);
  letter-spacing: 0.08em;
  margin-bottom: 4px;
  text-transform: uppercase;
}

.macro-value {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: -0.01em;
  line-height: 1.2;
}

.macro-sub {
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-top: 3px;
  font-family: var(--font-mono);
}

/* Macro Detail Panel */
.macro-detail-toggle {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px;
  cursor: pointer;
  font-size: 0.72rem;
  font-family: var(--font-mono);
  color: var(--cyan);
  letter-spacing: 0.06em;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: transparent;
  width: 100%;
  transition: background 0.2s, border-color 0.2s;
}

.macro-detail-toggle:hover {
  background: var(--cyan-dim);
  border-color: var(--border-hi);
}

.macro-detail-toggle .toggle-arrow {
  transition: transform 0.3s;
  font-size: 0.65rem;
}

.macro-detail-toggle.is-open .toggle-arrow {
  transform: rotate(180deg);
}

.macro-detail-panel {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s ease-out, opacity 0.3s ease;
  opacity: 0;
}

.macro-detail-panel.is-open {
  max-height: none;
  overflow: visible;
  opacity: 1;
}

.macro-detail-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  padding: 16px 0 4px;
}

.macro-detail-item {
  padding: 14px;
}

.macro-detail-item .md-label {
  font-size: 0.68rem;
  font-family: var(--font-mono);
  color: var(--text-muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.macro-detail-item .md-value {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text-bright);
  font-family: var(--font-mono);
}

.macro-detail-item .md-sub {
  font-size: 0.68rem;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ─── Geopolitical Risk Section ────────────────────────── */
.geo-container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.geo-gauge-card {
  padding: 22px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.gauge-label {
  font-size: 0.72rem;
  font-family: var(--font-mono);
  color: var(--text-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.gauge-wrap {
  width: 100%;
  max-width: 300px;
  position: relative;
}

.gauge-track {
  width: 100%;
  height: 18px;
  border-radius: 9px;
  background: rgba(255,255,255,0.06);
  overflow: hidden;
  position: relative;
}

.gauge-track::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg,
    #10b981 0%, #10b981 30%,
    #f59e0b 30%, #f59e0b 50%,
    #f97316 50%, #f97316 70%,
    #ef4444 70%, #ef4444 100%);
  opacity: 0.25;
  border-radius: 9px;
}

.gauge-fill {
  height: 100%;
  border-radius: 9px;
  position: relative;
  z-index: 1;
  animation: gaugeGrow 1s ease-out forwards;
  transition: width 0.6s ease;
}

.gauge-needle {
  position: absolute;
  top: -6px;
  width: 4px;
  height: 30px;
  background: var(--text-bright);
  border-radius: 2px;
  z-index: 2;
  box-shadow: 0 0 8px rgba(255,255,255,0.5);
  transform: translateX(-50%);
  transition: left 0.6s ease;
}

.gauge-score {
  font-size: 2rem;
  font-weight: 800;
  font-family: var(--font-mono);
  margin-top: 14px;
  letter-spacing: -0.02em;
}

.gauge-score-label {
  font-size: 0.72rem;
  color: var(--text-muted);
  font-family: var(--font-mono);
  margin-top: 2px;
}

.gauge-scale {
  display: flex;
  justify-content: space-between;
  width: 100%;
  max-width: 300px;
  margin-top: 6px;
  font-size: 0.6rem;
  font-family: var(--font-mono);
  color: var(--text-muted);
}

.geo-details-card {
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.geo-categories {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.geo-cat-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.geo-cat-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.geo-cat-name {
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text);
}

.geo-cat-score {
  font-size: 0.72rem;
  font-family: var(--font-mono);
  color: var(--text-bright);
  font-weight: 600;
}

.geo-cat-bar {
  height: 6px;
  border-radius: 3px;
  background: rgba(255,255,255,0.06);
  overflow: hidden;
}

.geo-cat-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.8s ease;
}

/* Safe haven mini-cards */
.safe-haven-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 8px;
}

.safe-haven-item {
  padding: 10px;
  text-align: center;
}

.sh-name {
  font-size: 0.68rem;
  font-family: var(--font-mono);
  color: var(--text-muted);
  letter-spacing: 0.04em;
  margin-bottom: 3px;
}

.sh-price {
  font-size: 0.88rem;
  font-weight: 700;
  color: var(--text-bright);
  font-family: var(--font-mono);
}

.sh-change {
  font-size: 0.68rem;
  font-family: var(--font-mono);
  font-weight: 600;
}

.sh-change.pos { color: var(--green); }
.sh-change.neg { color: var(--red); }

/* Geo news */
.geo-news {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.geo-news-item {
  font-size: 0.75rem;
  color: var(--text);
  padding: 6px 10px;
  background: rgba(255,255,255,0.02);
  border-radius: var(--radius-sm);
  border-left: 2px solid var(--amber);
  line-height: 1.4;
}

/* ─── Sector Cards ─────────────────────────────────────── */
.sectors-section { display: flex; flex-direction: column; gap: 14px; }

.sector-card {
  border-radius: var(--radius);
  overflow: hidden;
}

.sector-header {
  padding: 14px 18px;
  background: var(--surface-hi);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  user-select: none;
  transition: background 0.2s;
}

.sector-header:hover {
  background: rgba(22, 32, 50, 0.9);
}

.sector-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--cyan);
  flex-shrink: 0;
}

.sector-name {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: -0.01em;
}

.sector-sentiment-badge {
  font-size: 0.68rem;
  font-family: var(--font-mono);
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 3px;
  margin-left: 8px;
}

.sector-count {
  margin-left: auto;
  font-size: 0.72rem;
  font-family: var(--font-mono);
  color: var(--text-muted);
  background: rgba(255,255,255,0.05);
  padding: 3px 10px;
  border-radius: 20px;
}

.sector-toggle {
  color: var(--text-muted);
  font-size: 0.65rem;
  transition: transform 0.3s;
  margin-left: 8px;
}

.sector-header.is-open .sector-toggle {
  transform: rotate(180deg);
}

.sector-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}

.sector-body.is-open {
  max-height: 2000px;
}

/* ─── Stock Table ──────────────────────────────────────── */
.stock-table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

.stock-table thead th {
  font-size: 0.65rem;
  font-family: var(--font-mono);
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.25);
  white-space: nowrap;
  text-align: left;
  overflow: hidden;
}

.stock-table .col-name   { width: 22%; }
.stock-table .col-regime { width: 10%; text-align: center; }
.stock-table .col-sent   { width: 14%; }
.stock-table .col-price  { width: 14%; text-align: right; }
.stock-table .col-mcap   { width: 13%; text-align: right; }
.stock-table .col-per    { width: 12%; text-align: right; }
.stock-table .col-roe    { width: 10%; text-align: right; }
.stock-table .col-arrow  { width: 5%; text-align: center; }

.stock-row {
  cursor: pointer;
  transition: background 0.12s;
}

.stock-row:hover { background: rgba(6,182,212,0.05); }
.stock-row.is-open { background: rgba(6,182,212,0.07); }
.stock-row:nth-child(4n+1) { background: var(--row-even); }
.stock-row:nth-child(4n+1):hover { background: rgba(6,182,212,0.05); }

.stock-row td {
  padding: 12px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 0.85rem;
  vertical-align: middle;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.stock-name {
  font-weight: 600;
  color: var(--text-bright);
  line-height: 1.3;
}

.stock-ticker {
  font-size: 0.65rem;
  font-family: var(--font-mono);
  color: var(--text-muted);
  margin-left: 6px;
}

/* Regime badges */
.regime {
  display: inline-block;
  font-size: 0.68rem;
  font-family: var(--font-mono);
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 3px;
  white-space: nowrap;
  line-height: 1.4;
}

.regime-up-strong   { background: rgba(16,185,129,0.2);  color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
.regime-up          { background: rgba(16,185,129,0.12); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.2); }
.regime-up-weak     { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.25); }
.regime-sideways    { background: rgba(245,158,11,0.1);  color: #fcd34d; border: 1px solid rgba(245,158,11,0.2); }
.regime-down-weak   { background: rgba(249,115,22,0.15); color: #fb923c; border: 1px solid rgba(249,115,22,0.25); }
.regime-down        { background: rgba(239,68,68,0.15);  color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
.regime-down-strong { background: rgba(239,68,68,0.22);  color: #fca5a5; border: 1px solid rgba(239,68,68,0.35); }
.regime-unknown     { background: rgba(100,116,139,0.15); color: #94a3b8; border: 1px solid rgba(100,116,139,0.2); }

/* Sentiment */
.sent-label {
  font-size: 0.78rem;
  font-weight: 600;
}

.sent-score {
  font-size: 0.72rem;
  font-family: var(--font-mono);
  font-weight: 500;
  margin-left: 4px;
}

.col-pos  { color: var(--green); }
.col-neg  { color: var(--red); }
.col-neut { color: var(--text-muted); }

/* Numeric cells */
.num {
  font-family: var(--font-mono);
  text-align: right;
  color: var(--text-bright);
}

.num-muted {
  font-family: var(--font-mono);
  text-align: right;
  color: var(--text);
}

/* Expand arrow */
.arrow-cell {
  text-align: center;
  color: var(--text-muted);
  font-size: 0.65rem;
  transition: transform 0.2s;
}

.stock-row.is-open .arrow-cell { color: var(--cyan); }

/* ─── Detail Row (expanded) ────────────────────────────── */
.detail-row { display: none; }
.detail-row.is-visible { display: table-row; }

.detail-row td {
  padding: 0;
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.2);
}

.detail-panel {
  padding: 14px 16px 16px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px 16px;
}

.detail-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.detail-label {
  font-size: 0.68rem;
  font-family: var(--font-mono);
  color: var(--text-muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.detail-value {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-bright);
  font-family: var(--font-mono);
}

/* 52w range bar */
.range-bar-wrap { grid-column: 1 / -1; margin-top: 4px; }

.range-label-row {
  display: flex;
  justify-content: space-between;
  font-size: 0.68rem;
  font-family: var(--font-mono);
  color: var(--text-muted);
  margin-bottom: 4px;
}

.range-track {
  height: 4px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  position: relative;
  overflow: visible;
}

.range-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), var(--green));
  border-radius: 2px;
}

.range-current {
  position: absolute;
  top: -3px;
  width: 10px; height: 10px;
  background: var(--text-bright);
  border-radius: 50%;
  transform: translateX(-50%);
  box-shadow: 0 0 6px rgba(255,255,255,0.4);
}

/* ─── Charts Section ──────────────────────────────────── */
.charts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
  gap: 14px;
}

.chart-card {
  padding: 20px;
  min-height: 280px;
}

.chart-title {
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--text-bright);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.chart-title-icon {
  width: 24px; height: 24px;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.72rem;
  background: var(--cyan-dim);
}

.chart-wrap {
  position: relative;
  width: 100%;
  max-height: 260px;
}

/* ─── Portfolio Section ───────────────────────────────── */
.portfolio-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 14px;
}

.portfolio-card {
  padding: 20px;
  position: relative;
  overflow: hidden;
}

.portfolio-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}

.portfolio-card.aggressive::before { background: linear-gradient(90deg, var(--red), var(--orange)); }
.portfolio-card.balanced::before { background: linear-gradient(90deg, var(--cyan), var(--green)); }
.portfolio-card.conservative::before { background: linear-gradient(90deg, var(--green), #06b6d4); }

.portfolio-type {
  font-size: 0.68rem;
  font-family: var(--font-mono);
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.portfolio-card.aggressive .portfolio-type { color: var(--red); }
.portfolio-card.balanced .portfolio-type { color: var(--cyan); }
.portfolio-card.conservative .portfolio-type { color: var(--green); }

.portfolio-name {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--text-bright);
  margin-bottom: 12px;
}

.portfolio-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}

.port-stat-label {
  font-size: 0.65rem;
  font-family: var(--font-mono);
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.port-stat-value {
  font-size: 0.92rem;
  font-weight: 700;
  color: var(--text-bright);
  font-family: var(--font-mono);
}

.portfolio-weights {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.weight-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.weight-name {
  font-size: 0.72rem;
  color: var(--text);
  min-width: 80px;
  flex-shrink: 0;
}

.weight-bar-track {
  flex: 1;
  height: 6px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  overflow: hidden;
}

.weight-bar-fill {
  height: 100%;
  border-radius: 3px;
  background: var(--cyan);
  transition: width 0.6s ease;
}

.weight-pct {
  font-size: 0.68rem;
  font-family: var(--font-mono);
  color: var(--text-muted);
  min-width: 32px;
  text-align: right;
}

/* ─── Footer ───────────────────────────────────────────── */
.footer {
  margin-top: 48px;
  padding: 20px 0;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}

.footer-brand {
  font-size: 0.78rem;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

.footer-brand span { color: var(--cyan); }

.footer-time {
  font-size: 0.72rem;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

/* ─── Loading / Error ──────────────────────────────────── */
.state-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 20px;
  text-align: center;
}

.spinner {
  width: 40px; height: 40px;
  border: 2px solid var(--border);
  border-top-color: var(--cyan);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

.state-label {
  font-size: 0.82rem;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

.error-icon { font-size: 2.5rem; line-height: 1; }
.error-title { font-size: 1rem; font-weight: 700; color: var(--red); }
.error-msg {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-family: var(--font-mono);
  max-width: 320px;
}

/* ─── Mobile ───────────────────────────────────────────── */
@media (max-width: 768px) {
  .shell { padding: 0 12px 32px; }

  .macro-grid {
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .macro-card { padding: 12px; }
  .macro-icon { width: 28px; height: 28px; margin-bottom: 8px; font-size: 0.85rem; }
  .macro-value { font-size: 1rem; }

  .geo-container {
    grid-template-columns: 1fr;
  }

  .insights-grid {
    grid-template-columns: 1fr;
  }

  .charts-grid {
    grid-template-columns: 1fr;
  }

  .portfolio-grid {
    grid-template-columns: 1fr;
  }

  .stock-table .hide-mobile { display: none; }
  .stock-table { table-layout: auto; }

  .stock-table .col-name   { width: auto; }
  .stock-table .col-regime { width: auto; }
  .stock-table .col-sent   { width: auto; }
  .stock-table .col-price  { width: auto; }

  .stock-row td { padding: 10px 8px; font-size: 0.82rem; }
  .stock-table thead th { padding: 6px 8px; font-size: 0.62rem; }

  .sector-header { padding: 12px 14px; }

  .detail-panel {
    grid-template-columns: repeat(2, 1fr);
    padding: 12px;
  }

  .macro-detail-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .safe-haven-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .header-brand { gap: 8px; }
  .brand-title { font-size: 1.05rem; }
  .brand-icon { width: 36px; height: 36px; }
}

@media (max-width: 480px) {
  .macro-grid {
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
  }

  .macro-card { padding: 10px; }
  .macro-icon { width: 24px; height: 24px; font-size: 0.75rem; margin-bottom: 6px; }
  .macro-label { font-size: 0.62rem; }
  .macro-value { font-size: 0.88rem; }
  .macro-sub { font-size: 0.68rem; }
}
</style>
</head>
<body>

<div class="shell" id="app">
  <div class="state-screen" id="loading">
    <div class="spinner"></div>
    <div class="state-label">데이터를 불러오는 중...</div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ─── Utilities ───────────────────────────────────────
  const $ = s => document.querySelector(s);
  const h = s => s == null ? 'N/A' : String(s);

  function fmtPrice(v) {
    if (v == null) return 'N/A';
    if (v >= 1000) return Math.round(v).toLocaleString('ko-KR');
    if (v >= 1) return v.toLocaleString('ko-KR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    return v.toLocaleString('ko-KR', {minimumFractionDigits: 4, maximumFractionDigits: 4});
  }

  function fmtMcap(v) {
    if (v == null) return 'N/A';
    if (v >= 10000) return (v / 10000).toFixed(1) + '조';
    return Math.round(v).toLocaleString() + '억';
  }

  function fmtPct(v) {
    if (v == null) return 'N/A';
    return (v >= 0 ? '+' : '') + Number(v).toFixed(1) + '%';
  }

  function regimeClass(r) {
    if (!r) return 'regime-unknown';
    const map = {
      '강한상승': 'regime-up-strong', '상승': 'regime-up', '약한상승': 'regime-up-weak',
      '횡보': 'regime-sideways',
      '약한하락': 'regime-down-weak', '하락': 'regime-down', '강한하락': 'regime-down-strong'
    };
    return map[r] || 'regime-unknown';
  }

  function sentClass(score) {
    const n = parseFloat(score);
    if (isNaN(n)) return 'col-neut';
    return n > 0 ? 'col-pos' : n < 0 ? 'col-neg' : 'col-neut';
  }

  function riskColor(score) {
    if (score <= 30) return '#10b981';
    if (score <= 50) return '#f59e0b';
    if (score <= 70) return '#f97316';
    return '#ef4444';
  }

  function riskGradient(score) {
    if (score <= 30) return 'linear-gradient(90deg, #10b981, #34d399)';
    if (score <= 50) return 'linear-gradient(90deg, #10b981, #f59e0b)';
    if (score <= 70) return 'linear-gradient(90deg, #10b981, #f59e0b, #f97316)';
    return 'linear-gradient(90deg, #10b981, #f59e0b, #f97316, #ef4444)';
  }

  function riskLabel(score) {
    if (score <= 30) return '안정';
    if (score <= 50) return '경계';
    if (score <= 70) return '위험';
    return '심각';
  }

  // ─── Compute sector averages ─────────────────────────
  function sectorAvgSentiment(stocks) {
    let sum = 0, cnt = 0;
    stocks.forEach(s => {
      const v = parseFloat(s.sentiment_score);
      if (!isNaN(v)) { sum += v; cnt++; }
    });
    return cnt ? sum / cnt : 0;
  }

  function countRegimes(sectors) {
    const counts = {};
    sectors.forEach(sec => {
      sec.stocks.forEach(s => {
        const r = s.regime || '기타';
        counts[r] = (counts[r] || 0) + 1;
      });
    });
    return counts;
  }

  // ─── Render ──────────────────────────────────────────
  function render(data) {
    const app = $('#app');
    const dateParts = (data.date || '').split('-');
    const dateStr = dateParts.length === 3 ? `${dateParts[0]}년 ${parseInt(dateParts[1])}월 ${parseInt(dateParts[2])}일` : data.date;
    const timeStr = data.generated_at ? data.generated_at.split(' ')[1] || '' : '';

    let html = '';

    // ─── HEADER ────────────────────────────────────────
    html += `
    <header class="header">
      <div class="header-top">
        <div class="header-brand">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="2,18 7,10 12,14 17,6 22,10"/>
              <circle cx="22" cy="10" r="1.5" fill="#10b981" stroke="none"/>
            </svg>
          </div>
          <div>
            <div class="brand-title">AI 금융 분석 대시보드</div>
            <div class="brand-sub">MARKET INTELLIGENCE</div>
          </div>
        </div>
        <div class="header-meta">
          <span class="live-badge"><span class="live-dot"></span>LIVE</span>
          <span class="meta-date">${dateStr}</span>
          ${timeStr ? `<span class="meta-time">생성: ${timeStr}</span>` : ''}
        </div>
      </div>
    </header>`;

    // ─── AI INSIGHTS ───────────────────────────────────
    const ins = data.insights;
    if (ins && (ins.market_assessment || (ins.top_insights && ins.top_insights.length) || (ins.best_opportunities && ins.best_opportunities.length))) {
      html += `<section class="section-wrap"><div class="section-label">AI 인사이트</div><div class="insights-grid">`;

      // Market assessment
      if (ins.market_assessment) {
        html += `<div class="insight-card glass-card type-info anim-item">
          <div class="insight-icon info">&#128200;</div>
          <div class="insight-title">시장 종합 평가</div>
          <div class="insight-desc">${ins.market_assessment}</div>
        </div>`;
      }

      // Top insights
      if (ins.top_insights && ins.top_insights.length > 0) {
        ins.top_insights.forEach(tip => {
          html += `<div class="insight-card glass-card type-opportunity anim-item">
            <div class="insight-icon opportunity">&#9733;</div>
            <div class="insight-title">핵심 포인트</div>
            <div class="insight-desc">${tip}</div>
          </div>`;
        });
      }

      // Key risks
      if (ins.key_risks && ins.key_risks.length > 0) {
        ins.key_risks.forEach(risk => {
          html += `<div class="insight-card glass-card type-warning anim-item">
            <div class="insight-icon warning">&#9888;</div>
            <div class="insight-title">주의 사항</div>
            <div class="insight-desc">${risk}</div>
          </div>`;
        });
      }

      // Best opportunities
      if (ins.best_opportunities && ins.best_opportunities.length > 0) {
        ins.best_opportunities.slice(0, 3).forEach(opp => {
          html += `<div class="insight-card glass-card type-opportunity anim-item">
            <div class="insight-icon opportunity">&#128161;</div>
            <div class="insight-title">${opp.asset || '투자 기회'}</div>
            <div class="insight-desc">${opp.reason || ''}</div>
          </div>`;
        });
      }

      html += `</div></section>`;
    }

    // ─── MACRO ─────────────────────────────────────────
    const m = data.macro || {};
    html += `
    <section class="section-wrap">
      <div class="section-label">매크로 환경</div>
      <div class="macro-grid">
        <div class="macro-card glass-card anim-item">
          <div class="macro-icon cycle">&#9881;</div>
          <div class="macro-label">경기 사이클</div>
          <div class="macro-value">${h(m.cycle)}</div>
          ${m.ffr ? `<div class="macro-sub">기준금리 ${m.ffr}</div>` : ''}
        </div>
        <div class="macro-card glass-card anim-item">
          <div class="macro-icon rate">&#9650;</div>
          <div class="macro-label">금리 방향</div>
          <div class="macro-value">${h(m.rate)}</div>
          ${m.ffr ? `<div class="macro-sub">FFR ${m.ffr}</div>` : ''}
        </div>
        <div class="macro-card glass-card anim-item">
          <div class="macro-icon infl">&#9670;</div>
          <div class="macro-label">인플레이션</div>
          <div class="macro-value">${h(m.cpi || m.inflation)}</div>
          ${m.cpi ? `<div class="macro-sub">CPI 기준</div>` : ''}
        </div>
      </div>`;

    // Macro Detail (expandable)
    if (data.macro_detail) {
      const md = data.macro_detail;
      html += `
      <button class="macro-detail-toggle" onclick="toggleMacroDetail(this)">
        상세 매크로 지표 <span class="toggle-arrow">&#9660;</span>
      </button>
      <div class="macro-detail-panel" id="macroDetailPanel">
        <div class="macro-detail-grid">`;

      const ffrD = md.ffr || {};
      const unempD = md.unemployment || {};
      const gdpD = md.gdp || {};
      const vixD = md.vix || {};
      const ycD = md.yield_curve || {};
      const t10 = md.treasury_10y || {};
      const t2 = md.treasury_2y || {};
      const dolD = md.dollar_index || {};
      const rcD = md.rate_cycle || {};
      const ecD = md.economic_cycle || {};

      const safeFixed = (v, d) => { const n = parseFloat(v); return isNaN(n) ? String(v || 'N/A') : n.toFixed(d); };
      const detailItems = [
        { label: '기준금리(FFR)', value: ffrD.current, trend: ffrD.trend, fmt: v => safeFixed(v, 2) + '%' },
        { label: '실업률', value: unempD.current, trend: unempD.trend, fmt: v => safeFixed(v, 1) + '%' },
        { label: '실질GDP', value: gdpD.current, trend: gdpD.trend, fmt: v => safeFixed(v, 1) },
        { label: 'VIX', value: vixD.current, trend: vixD.trend, fmt: v => safeFixed(v, 1) },
        { label: '10Y-2Y 스프레드', value: ycD.spread_10y2y, trend: ycD.trend, fmt: v => safeFixed(v, 2) + '%' },
        { label: '10년국채', value: t10.current, trend: t10.trend, fmt: v => safeFixed(v, 2) + '%' },
        { label: '2년국채', value: t2.current, trend: t2.trend, fmt: v => safeFixed(v, 2) + '%' },
        { label: '달러인덱스', value: dolD.current, trend: dolD.trend, fmt: v => safeFixed(v, 1) },
        { label: 'CPI (YoY)', value: md.cpi_yoy, fmt: v => typeof v === 'string' ? v : safeFixed(v, 2) + '%' },
        { label: '기대인플레(10Y)', value: md.breakeven_inflation_10y, fmt: v => safeFixed(v, 2) + '%' },
        { label: '실질금리', value: md.real_rate, fmt: v => typeof v === 'string' ? v : safeFixed(v, 2) + '%' },
      ];

      detailItems.forEach(item => {
        if (item.value != null) {
          const trendIcon = item.trend === '상승' ? '&#9650;' : item.trend === '하락' ? '&#9660;' : item.trend === '안정' ? '&#9644;' : '';
          const trendColor = item.trend === '상승' ? 'var(--red)' : item.trend === '하락' ? 'var(--green)' : 'var(--text-muted)';
          html += `
          <div class="macro-detail-item glass-card">
            <div class="md-label">${item.label}</div>
            <div class="md-value">${item.fmt(item.value)} ${trendIcon ? `<span style="color:${trendColor};font-size:0.7rem;">${trendIcon}</span>` : ''}</div>
          </div>`;
        }
      });

      // Rate cycle & Economic cycle
      html += `
        <div class="macro-detail-item glass-card" style="grid-column:span 2;">
          <div class="md-label">금리 사이클</div>
          <div class="md-value">${h(rcD.stage)}${rcD.description && rcD.description !== 'N/A' ? ` <span style="font-size:0.7rem;color:var(--text-muted);">${rcD.description}</span>` : ''}</div>
        </div>
        <div class="macro-detail-item glass-card" style="grid-column:span 2;">
          <div class="md-label">경기 사이클</div>
          <div class="md-value">${h(ecD.stage)}${ecD.score != null ? ` (${ecD.score})` : ''}${ecD.description && ecD.description !== 'N/A' ? ` <span style="font-size:0.7rem;color:var(--text-muted);">${ecD.description}</span>` : ''}</div>
        </div>`;

      // Key signals
      if (md.key_signals && md.key_signals.length > 0) {
        html += `<div style="grid-column:1/-1;margin-top:4px;"><div style="font-size:0.68rem;font-family:var(--font-mono);color:var(--amber);margin-bottom:6px;">KEY SIGNALS</div>`;
        md.key_signals.forEach(sig => {
          let signalText = typeof sig === 'string' ? sig : `${sig.signal} — <span style="color:${sig.direction === 'positive' ? 'var(--green,#4ade80)' : sig.direction === 'negative' ? 'var(--red,#f87171)' : 'var(--text)'}">${sig.interpretation}</span>`;
          html += `<div style="font-size:0.78rem;color:var(--text);margin-bottom:3px;">&#8226; ${signalText}</div>`;
        });
        html += `</div>`;
      }

      // Asset outlook
      if (md.asset_outlook && md.asset_outlook.length > 0) {
        html += `<div style="grid-column:1/-1;margin-top:4px;"><div style="font-size:0.68rem;font-family:var(--font-mono);color:var(--cyan);margin-bottom:6px;">ASSET OUTLOOK</div>`;
        md.asset_outlook.forEach(outlook => {
          let outlookText = typeof outlook === 'string' ? outlook : `<b>${outlook.asset}</b> <span style="color:${outlook.outlook === '긍정' ? 'var(--green,#4ade80)' : outlook.outlook === '부정' ? 'var(--red,#f87171)' : 'var(--text)'}">[${outlook.outlook}]</span> ${outlook.strategy}`;
          html += `<div style="font-size:0.78rem;color:var(--text);margin-bottom:3px;">&#8226; ${outlookText}</div>`;
        });
        html += `</div>`;
      }

      // FOMC outlook
      if (md.fomc && md.fomc.next_meeting) {
        const fomc = md.fomc;
        const expColor = fomc.market_expectation === 'cut' ? 'var(--green,#4ade80)' : fomc.market_expectation === 'hike' ? 'var(--red,#f87171)' : 'var(--amber,#fbbf24)';
        const expLabel = fomc.market_expectation === 'cut' ? '인하 기대' : fomc.market_expectation === 'hike' ? '인상 기대' : '동결 예상';
        const dday = fomc.days_until != null ? ` (D-${fomc.days_until})` : '';
        const rateRange = (fomc.target_lower != null && fomc.target_upper != null) ? `${fomc.target_lower.toFixed(2)}% ~ ${fomc.target_upper.toFixed(2)}%` : 'N/A';
        html += `<div style="grid-column:1/-1;margin-top:4px;"><div style="font-size:0.68rem;font-family:var(--font-mono);color:var(--purple,#a78bfa);margin-bottom:6px;">FOMC OUTLOOK</div>`;
        html += `<div style="font-size:0.78rem;color:var(--text);margin-bottom:3px;">&#8226; 다음 회의: <b>${h(fomc.next_meeting)}</b>${dday}</div>`;
        html += `<div style="font-size:0.78rem;color:var(--text);margin-bottom:3px;">&#8226; 시장 전망: <span style="color:${expColor};font-weight:600;">${expLabel}</span></div>`;
        html += `<div style="font-size:0.78rem;color:var(--text);margin-bottom:3px;">&#8226; 목표금리: ${rateRange}</div>`;
        html += `</div>`;
      }

      html += `</div></div>`;
    }
    html += `</section>`;

    // ─── GEOPOLITICAL RISK ─────────────────────────────
    if (data.geopolitical) {
      const geo = data.geopolitical;
      const score = geo.risk_score || geo.overall_score || 0;
      const color = riskColor(score);

      html += `
      <section class="section-wrap">
        <div class="section-label">지정학 리스크</div>
        <div class="geo-container">
          <div class="geo-gauge-card glass-card anim-item">
            <div class="gauge-label">종합 리스크 지수</div>
            <div class="gauge-wrap">
              <div class="gauge-track">
                <div class="gauge-fill" style="width:${score}%; background:${riskGradient(score)};"></div>
                <div class="gauge-needle" style="left:${score}%;"></div>
              </div>
              <div class="gauge-scale">
                <span>0</span><span>25</span><span>50</span><span>75</span><span>100</span>
              </div>
            </div>
            <div class="gauge-score" style="color:${color};">${score}</div>
            <div class="gauge-score-label">${riskLabel(score)}</div>
          </div>
          <div class="geo-details-card glass-card anim-item">`;

      // Category breakdown
      if (geo.categories && geo.categories.length > 0) {
        html += `<div class="geo-categories">`;
        geo.categories.forEach(cat => {
          const catScore = cat.score || 0;
          const catColor = riskColor(catScore);
          const catName = cat.name || cat.category || '';
          html += `
          <div class="geo-cat-item">
            <div class="geo-cat-header">
              <span class="geo-cat-name">${catName}${cat.news_count ? ' ('+cat.news_count+')' : ''}</span>
              <span class="geo-cat-score" style="color:${catColor}">${catScore}</span>
            </div>
            <div class="geo-cat-bar">
              <div class="geo-cat-fill" style="width:${cat.score}%; background:${catColor};"></div>
            </div>
          </div>`;
        });
        html += `</div>`;
      }

      // Safe haven assets
      const safeHavens = geo.safe_haven_assets || geo.safe_havens || [];
      if (safeHavens.length > 0) {
        html += `<div style="margin-top:4px;"><div style="font-size:0.68rem;font-family:var(--font-mono);color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;">안전자산 동향</div>
        <div class="safe-haven-grid">`;
        safeHavens.forEach(sh => {
          const weekChg = parseFloat(sh.week_change || sh.change || 0);
          const chgClass = isNaN(weekChg) ? '' : weekChg >= 0 ? 'pos' : 'neg';
          const price = sh.current_value || sh.price;
          html += `
          <div class="safe-haven-item glass-card">
            <div class="sh-name">${sh.name}</div>
            <div class="sh-price">${price != null ? fmtPrice(price) : 'N/A'}</div>
            <div class="sh-change ${chgClass}">${!isNaN(weekChg) ? (weekChg >= 0 ? '+' : '') + weekChg.toFixed(1) + '%' : ''}</div>
            ${sh.signal ? `<div style="font-size:0.6rem;color:var(--text-muted);margin-top:2px;">${sh.signal}</div>` : ''}
          </div>`;
        });
        html += `</div></div>`;
      }

      html += `</div></div>`;

      // Top news
      const topNews = geo.top_news || geo.news || [];
      if (topNews.length > 0) {
        html += `<div class="geo-news" style="margin-top:14px;"><div style="font-size:0.68rem;font-family:var(--font-mono);color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;">주요 뉴스</div>`;
        topNews.slice(0, 5).forEach(n => {
          const title = typeof n === 'string' ? n : (n.title || n.headline || '');
          const titleKr = typeof n === 'object' ? (n.title_kr || '') : '';
          const link = typeof n === 'object' ? (n.link || '') : '';
          const src = typeof n === 'object' ? (n.source || '') : '';
          const nScore = typeof n === 'object' ? (n.risk_score || n.score || '') : '';
          const displayTitle = titleKr || title;
          const titleHtml = link
            ? `<a href="${link}" target="_blank" rel="noopener noreferrer" style="color:var(--text);text-decoration:none;font-weight:500;" onmouseover="this.style.color='var(--cyan)'" onmouseout="this.style.color='var(--text)'">${displayTitle}</a>`
            : `<span style="font-weight:500;">${displayTitle}</span>`;
          const origHtml = (titleKr && title && titleKr !== title)
            ? `<div style="font-size:0.65rem;color:var(--text-muted);margin-top:2px;">${title}</div>`
            : '';
          html += `<div class="geo-news-item">
            ${titleHtml}
            ${src ? `<span style="color:var(--text-muted);font-size:0.7rem;"> — ${src}</span>` : ''}
            ${nScore ? `<span style="color:var(--amber);font-size:0.7rem;"> [${nScore}]</span>` : ''}
            ${origHtml}
          </div>`;
        });
        html += `</div>`;
      }

      html += `</section>`;
    }

    // ─── SECTORS ───────────────────────────────────────
    html += `<section class="section-wrap"><div class="section-label">섹터별 종목 분석</div><div class="sectors-section">`;

    (data.sectors || []).forEach((sec, si) => {
      const isFirst = si === 0;
      const avgSent = sectorAvgSentiment(sec.stocks);
      const sentBadgeClass = avgSent > 0 ? 'col-pos' : avgSent < 0 ? 'col-neg' : 'col-neut';
      const sentBadgeBg = avgSent > 0 ? 'var(--green-dim)' : avgSent < 0 ? 'var(--red-dim)' : 'rgba(100,116,139,0.15)';

      html += `
      <div class="sector-card glass-card anim-item">
        <div class="sector-header ${isFirst ? 'is-open' : ''}" onclick="toggleSector(this)">
          <span class="sector-dot"></span>
          <span class="sector-name">${sec.name}</span>
          <span class="sector-sentiment-badge ${sentBadgeClass}" style="background:${sentBadgeBg}">${avgSent >= 0 ? '+' : ''}${avgSent.toFixed(1)}</span>
          <span class="sector-count">${sec.stocks.length}종목</span>
          <span class="sector-toggle">&#9660;</span>
        </div>
        <div class="sector-body ${isFirst ? 'is-open' : ''}">
          <table class="stock-table">
            <thead>
              <tr>
                <th class="col-name">종목</th>
                <th class="col-regime">레짐</th>
                <th class="col-sent">센티멘트</th>
                <th class="col-price hide-mobile">현재가</th>
                <th class="col-mcap hide-mobile">시총</th>
                <th class="col-per hide-mobile">F.PER</th>
                <th class="col-roe hide-mobile">ROE</th>
                <th class="col-arrow"></th>
              </tr>
            </thead>
            <tbody>`;

      sec.stocks.forEach((st, sti) => {
        const sc = sentClass(st.sentiment_score);
        const rc = regimeClass(st.regime);
        html += `
              <tr class="stock-row" onclick="toggleDetail(this)">
                <td class="col-name"><span class="stock-name">${st.name}</span><span class="stock-ticker">${st.ticker}</span></td>
                <td class="col-regime"><span class="regime ${rc}">${st.regime || '?'}</span></td>
                <td class="col-sent"><span class="sent-label ${sc}">${st.sentiment_label || ''}</span><span class="sent-score ${sc}">${h(st.sentiment_score)}</span></td>
                <td class="col-price hide-mobile"><span class="num">${fmtPrice(st.price)}</span></td>
                <td class="col-mcap hide-mobile"><span class="num-muted">${fmtMcap(st.market_cap)}</span></td>
                <td class="col-per hide-mobile"><span class="num-muted">${st.forward_per != null ? st.forward_per.toFixed(1) : 'N/A'}</span></td>
                <td class="col-roe hide-mobile"><span class="num-muted">${st.roe != null ? st.roe.toFixed(1) + '%' : 'N/A'}</span></td>
                <td class="col-arrow"><span class="arrow-cell">&#9660;</span></td>
              </tr>
              <tr class="detail-row">
                <td colspan="8">
                  <div class="detail-panel">
                    <div class="detail-item"><div class="detail-label">현재가</div><div class="detail-value">${fmtPrice(st.price)}</div></div>
                    <div class="detail-item"><div class="detail-label">시가총액</div><div class="detail-value">${fmtMcap(st.market_cap)}</div></div>
                    <div class="detail-item"><div class="detail-label">PER</div><div class="detail-value">${st.per != null && st.per !== 'N/A' ? Number(st.per).toFixed(1) : 'N/A'}</div></div>
                    <div class="detail-item"><div class="detail-label">Forward PER</div><div class="detail-value">${st.forward_per != null ? st.forward_per.toFixed(1) : 'N/A'}</div></div>
                    <div class="detail-item"><div class="detail-label">ROE</div><div class="detail-value">${st.roe != null ? st.roe.toFixed(1) + '%' : 'N/A'}</div></div>
                    <div class="detail-item"><div class="detail-label">매출성장률</div><div class="detail-value">${st.revenue_growth != null ? fmtPct(st.revenue_growth) : 'N/A'}</div></div>
                    ${st.high_52w != null && st.low_52w != null ? `
                    <div class="range-bar-wrap">
                      <div class="range-label-row"><span>52주 최저 ${fmtPrice(st.low_52w)}</span><span>52주 최고 ${fmtPrice(st.high_52w)}</span></div>
                      <div class="range-track">
                        <div class="range-fill" style="width:${Math.min(100, ((st.price - st.low_52w) / (st.high_52w - st.low_52w) * 100)).toFixed(1)}%"></div>
                        <div class="range-current" style="left:${Math.min(100, ((st.price - st.low_52w) / (st.high_52w - st.low_52w) * 100)).toFixed(1)}%"></div>
                      </div>
                    </div>` : ''}
                  </div>
                </td>
              </tr>`;
      });

      html += `</tbody></table></div></div>`;
    });

    html += `</div></section>`;

    // ─── CHARTS ────────────────────────────────────────
    html += `
    <section class="section-wrap">
      <div class="section-label">차트 분석</div>
      <div class="charts-grid">
        <div class="chart-card glass-card anim-item">
          <div class="chart-title"><span class="chart-title-icon">&#9632;</span>섹터별 센티멘트</div>
          <div class="chart-wrap"><canvas id="chartSentiment"></canvas></div>
        </div>
        <div class="chart-card glass-card anim-item">
          <div class="chart-title"><span class="chart-title-icon">&#9673;</span>레짐 분포</div>
          <div class="chart-wrap"><canvas id="chartRegime"></canvas></div>
        </div>`;

    if (data.portfolios) {
      html += `
        <div class="chart-card glass-card anim-item">
          <div class="chart-title"><span class="chart-title-icon">&#9650;</span>포트폴리오 Sharpe Ratio</div>
          <div class="chart-wrap"><canvas id="chartSharpe"></canvas></div>
        </div>`;
    }

    html += `</div></section>`;

    // ─── PORTFOLIOS ────────────────────────────────────
    const pfData = data.portfolios;
    if (pfData && pfData.sectors && pfData.sectors.length > 0) {
      html += `<section class="section-wrap"><div class="section-label">포트폴리오 분석</div>`;

      // Best/Worst summary
      if (pfData.best_sector || pfData.worst_sector) {
        html += `<div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;">`;
        if (pfData.best_sector) {
          html += `<div class="glass-card anim-item" style="flex:1;min-width:200px;padding:14px;">
            <div style="font-size:0.7rem;color:var(--green);font-family:var(--font-mono);">BEST SHARPE</div>
            <div style="font-size:1.1rem;font-weight:700;color:var(--text-bright);">${pfData.best_sector.name}</div>
            <div style="font-size:1.3rem;font-weight:800;color:var(--green);">${(pfData.best_sector.sharpe_ratio || 0).toFixed(2)}</div>
          </div>`;
        }
        if (pfData.worst_sector) {
          html += `<div class="glass-card anim-item" style="flex:1;min-width:200px;padding:14px;">
            <div style="font-size:0.7rem;color:var(--red);font-family:var(--font-mono);">WORST SHARPE</div>
            <div style="font-size:1.1rem;font-weight:700;color:var(--text-bright);">${pfData.worst_sector.name}</div>
            <div style="font-size:1.3rem;font-weight:800;color:var(--red);">${(pfData.worst_sector.sharpe_ratio || 0).toFixed(2)}</div>
          </div>`;
        }
        html += `</div>`;
      }

      // Sector portfolio cards
      html += `<div class="portfolio-grid">`;
      pfData.sectors.forEach(sec => {
        const sharpe = sec.sharpe_ratio || 0;
        const sharpeColor = sharpe > 1 ? 'var(--green)' : sharpe > 0 ? 'var(--cyan)' : 'var(--red)';
        html += `
        <div class="portfolio-card glass-card anim-item">
          <div class="portfolio-type" style="color:${sharpeColor};">${sec.name}</div>
          <div class="portfolio-stats">
            <div><div class="port-stat-label">Sharpe</div><div class="port-stat-value" style="color:${sharpeColor};">${sharpe.toFixed(2)}</div></div>
            ${sec.annual_return ? `<div><div class="port-stat-label">연수익률</div><div class="port-stat-value">${sec.annual_return}</div></div>` : ''}
            ${sec.max_drawdown ? `<div><div class="port-stat-label">MDD</div><div class="port-stat-value">${sec.max_drawdown}</div></div>` : ''}
            ${sec.annual_volatility ? `<div><div class="port-stat-label">변동성</div><div class="port-stat-value">${sec.annual_volatility}</div></div>` : ''}
            ${sec.var_95 ? `<div><div class="port-stat-label">VaR 95%</div><div class="port-stat-value">${sec.var_95}</div></div>` : ''}
            ${sec.beta != null ? `<div><div class="port-stat-label">Beta</div><div class="port-stat-value">${sec.beta}</div></div>` : ''}
          </div>`;

        // Show allocation types if available
        if (sec.allocations) {
          const allocTypes = [
            { key: 'aggressive', label: '공격형', color: 'var(--red)' },
            { key: 'balanced', label: '균형형', color: 'var(--cyan)' },
            { key: 'conservative', label: '안정형', color: 'var(--green)' }
          ];
          html += `<div class="portfolio-weights">`;
          allocTypes.forEach(at => {
            const alloc = sec.allocations[at.key];
            if (alloc && alloc.weights) {
              html += `<div style="margin-top:8px;"><span style="font-size:0.72rem;color:${at.color};font-weight:600;">${at.label}</span>
                <span style="font-size:0.65rem;color:var(--text-muted);margin-left:6px;">Sharpe ${alloc.sharpe || 'N/A'}</span></div>`;
              Object.entries(alloc.weights).forEach(([name, weight]) => {
                const w = parseFloat(weight) || 0;
                html += `
                <div class="weight-row">
                  <span class="weight-name">${name}</span>
                  <div class="weight-bar-track"><div class="weight-bar-fill" style="width:${Math.min(w, 100)}%"></div></div>
                  <span class="weight-pct">${weight}</span>
                </div>`;
              });
            }
          });
          html += `</div>`;
        }

        html += `</div>`;
      });

      html += `</div></section>`;
    }

    // ─── FOOTER ────────────────────────────────────────
    html += `
    <footer class="footer">
      <div class="footer-brand"><span>AI</span> Finance Dashboard</div>
      <div class="footer-time">최종 업데이트: ${data.generated_at || data.date || ''}</div>
    </footer>`;

    app.innerHTML = html;

    // ─── Render Charts ─────────────────────────────────
    setTimeout(() => renderCharts(data), 100);
  }

  // ─── Charts ──────────────────────────────────────────
  function renderCharts(data) {
    const sectors = data.sectors || [];

    // Chart defaults
    Chart.defaults.color = '#94a3b8';
    Chart.defaults.borderColor = 'rgba(6,182,212,0.1)';
    Chart.defaults.font.family = "-apple-system, 'Noto Sans KR', 'Malgun Gothic', sans-serif";

    // 1. Sector Sentiment Bar Chart (horizontal)
    const sentCtx = document.getElementById('chartSentiment');
    if (sentCtx) {
      const labels = sectors.map(s => s.name);
      const values = sectors.map(s => {
        let sum = 0, cnt = 0;
        s.stocks.forEach(st => {
          const v = parseFloat(st.sentiment_score);
          if (!isNaN(v)) { sum += v; cnt++; }
        });
        return cnt ? +(sum / cnt).toFixed(1) : 0;
      });
      const colors = values.map(v => v >= 0 ? 'rgba(16,185,129,0.7)' : 'rgba(239,68,68,0.7)');
      const borderColors = values.map(v => v >= 0 ? '#10b981' : '#ef4444');

      new Chart(sentCtx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            data: values,
            backgroundColor: colors,
            borderColor: borderColors,
            borderWidth: 1,
            borderRadius: 4,
            barThickness: 22
          }]
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => `센티멘트: ${ctx.parsed.x >= 0 ? '+' : ''}${ctx.parsed.x}`
              }
            }
          },
          scales: {
            x: {
              grid: { color: 'rgba(255,255,255,0.04)' },
              ticks: { font: { size: 11 } }
            },
            y: {
              grid: { display: false },
              ticks: { font: { size: 12 } }
            }
          }
        }
      });
    }

    // 2. Regime Distribution Donut Chart
    const regimeCtx = document.getElementById('chartRegime');
    if (regimeCtx) {
      const regimeCounts = countRegimes(sectors);
      const regimeLabels = Object.keys(regimeCounts);
      const regimeValues = Object.values(regimeCounts);

      const regimeColorMap = {
        '강한상승': '#34d399', '상승': '#6ee7b7', '약한상승': '#fbbf24',
        '횡보': '#fcd34d',
        '약한하락': '#fb923c', '하락': '#f87171', '강한하락': '#fca5a5'
      };
      const rColors = regimeLabels.map(r => regimeColorMap[r] || '#94a3b8');

      new Chart(regimeCtx, {
        type: 'doughnut',
        data: {
          labels: regimeLabels,
          datasets: [{
            data: regimeValues,
            backgroundColor: rColors.map(c => c + 'bb'),
            borderColor: rColors,
            borderWidth: 1,
            hoverOffset: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '55%',
          plugins: {
            legend: {
              position: 'right',
              labels: {
                boxWidth: 12,
                padding: 10,
                font: { size: 11 },
                usePointStyle: true,
                pointStyleWidth: 8
              }
            },
            tooltip: {
              callbacks: {
                label: ctx => `${ctx.label}: ${ctx.parsed}개 종목`
              }
            }
          }
        }
      });
    }

    // 3. Portfolio Sharpe Ratio (if portfolios exist)
    if (data.portfolios && data.portfolios.sectors) {
      const sharpeCtx = document.getElementById('chartSharpe');
      if (sharpeCtx) {
        const pfLabels = data.portfolios.sectors.map(s => s.name);
        const pfValues = data.portfolios.sectors.map(s => s.sharpe_ratio || 0);
        const pfColors = pfValues.map(v => v > 1 ? 'rgba(16,185,129,0.7)' : v > 0 ? 'rgba(6,182,212,0.7)' : 'rgba(239,68,68,0.7)');
        const pfBorders = pfValues.map(v => v > 1 ? '#10b981' : v > 0 ? '#06b6d4' : '#ef4444');

        new Chart(sharpeCtx, {
          type: 'bar',
          data: {
            labels: pfLabels,
            datasets: [{
              data: pfValues,
              backgroundColor: pfColors,
              borderColor: pfBorders,
              borderWidth: 1,
              borderRadius: 4,
              barThickness: 40
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: ctx => `Sharpe: ${ctx.parsed.y.toFixed(2)}`
                }
              }
            },
            scales: {
              x: {
                grid: { display: false },
                ticks: { font: { size: 12 } }
              },
              y: {
                grid: { color: 'rgba(255,255,255,0.04)' },
                ticks: { font: { size: 11 } },
                beginAtZero: true
              }
            }
          }
        });
      }
    }
  }

  // ─── Interactions ────────────────────────────────────
  window.toggleSector = function(header) {
    header.classList.toggle('is-open');
    const body = header.nextElementSibling;
    body.classList.toggle('is-open');
  };

  window.toggleDetail = function(row) {
    row.classList.toggle('is-open');
    const detail = row.nextElementSibling;
    if (detail && detail.classList.contains('detail-row')) {
      detail.classList.toggle('is-visible');
    }
  };

  window.toggleMacroDetail = function(btn) {
    btn.classList.toggle('is-open');
    const panel = document.getElementById('macroDetailPanel');
    if (!panel) return;
    const isOpening = btn.classList.contains('is-open');
    if (isOpening) {
      panel.style.maxHeight = panel.scrollHeight + 'px';
      panel.style.overflow = 'hidden';
      panel.classList.add('is-open');
      panel.addEventListener('transitionend', function onEnd(e) {
        if (e.propertyName !== 'max-height') return;
        panel.removeEventListener('transitionend', onEnd);
        panel.style.maxHeight = 'none';
        panel.style.overflow = 'visible';
      });
    } else {
      panel.style.maxHeight = panel.scrollHeight + 'px';
      panel.style.overflow = 'hidden';
      panel.offsetHeight; // force reflow
      panel.style.maxHeight = '0';
      panel.classList.remove('is-open');
    }
  };

  // ─── Load Data ───────────────────────────────────────
  fetch('./data.json')
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    })
    .then(data => render(data))
    .catch(err => {
      $('#app').innerHTML = `
        <div class="state-screen">
          <div class="error-icon">&#9888;</div>
          <div class="error-title">데이터 로드 실패</div>
          <div class="error-msg">${err.message}</div>
        </div>`;
    });

})();
</script>
</body>
</html>
