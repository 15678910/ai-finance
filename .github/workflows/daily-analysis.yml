name: Daily Finance Analysis

on:
  schedule:
    # 매일 한국시간 오전 8시 (UTC 23시, 전날)
    - cron: '0 23 * * *'
  workflow_dispatch: # 수동 실행 버튼

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily analysis
        run: |
          python daily_sector_analysis.py 2>&1 || echo "Analysis had errors, checking partial results..."
          echo "--- Output directory contents ---"
          find output/ -type f 2>/dev/null | head -50 || echo "No output directory"
        env:
          PYTHONIOENCODING: utf-8

      - name: Generate dashboard data
        if: always()
        run: |
          DATE=$(date -u -d '+9 hours' +%Y%m%d)
          DAILY_DIR="output/daily/$DATE"
          echo "Looking for results in: $DAILY_DIR"
          ls -la "$DAILY_DIR"/ 2>/dev/null || echo "Daily dir not found, checking alternatives..."
          # Find any daily output directory
          LATEST_DIR=$(ls -td output/daily/*/ 2>/dev/null | head -1)
          if [ -n "$LATEST_DIR" ]; then
            echo "Using latest dir: $LATEST_DIR"
            ACTUAL_DATE=$(basename "$LATEST_DIR")
            python generate_dashboard_data.py --date "$ACTUAL_DATE" --daily-dir "$LATEST_DIR" || echo "Dashboard generation failed"
          else
            echo "No daily output found"
          fi

      - name: Commit and push results
        if: always()
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          git add docs/data.json 2>/dev/null || true

          if git diff --cached --quiet 2>/dev/null; then
            echo "No dashboard changes to commit"
          else
            DATE=$(date -u -d '+9 hours' +%Y-%m-%d)
            git commit -m "Update dashboard data ($DATE) [automated]"
            git push
            echo "Dashboard updated successfully"
          fi

      - name: Upload analysis artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analysis-results-${{ github.run_number }}
          path: output/daily/
          retention-days: 30
          if-no-files-found: warn
