name: Breaking News Monitor

on:
  schedule:
    # 1시간마다 실행 (UTC 기준, 정시)
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run breaking news monitor
        env:
          TELEGRAM_FINANCE_BOT_TOKEN: ${{ secrets.TELEGRAM_FINANCE_BOT_TOKEN }}
          TELEGRAM_FINANCE_CHAT_ID: ${{ secrets.TELEGRAM_FINANCE_CHAT_ID }}
          PYTHONIOENCODING: utf-8
        run: |
          python breaking_news_monitor.py

      - name: Commit and push state file
        if: always()
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          git add docs/breaking_news_state.json 2>/dev/null || true

          if git diff --cached --quiet 2>/dev/null; then
            echo "No state changes"
          else
            git commit -m "Update breaking news state [automated]"
            git pull --rebase
            git push
            echo "State updated"
          fi
