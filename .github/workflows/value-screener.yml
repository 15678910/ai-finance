name: Value Screener (Weekly)

on:
  schedule:
    # 매주 월요일 KST 06:00 (UTC 21:00 일요일)
    - cron: '0 21 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy

      - name: Run value screener
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          TELEGRAM_FINANCE_BOT_TOKEN: ${{ secrets.TELEGRAM_FINANCE_BOT_TOKEN }}
          TELEGRAM_FINANCE_CHAT_ID: ${{ secrets.TELEGRAM_FINANCE_CHAT_ID }}
          PYTHONIOENCODING: utf-8
        run: |
          python value_screener.py

      - name: Commit results
        if: always()
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          git add docs/value_screener.json 2>/dev/null || true

          if git diff --cached --quiet 2>/dev/null; then
            echo "No changes"
          else
            git pull --rebase
            git commit -m "Update value screener results [automated]"
            git push
            echo "Value screener results updated"
          fi
