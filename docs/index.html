<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="AI 기반 한국 주식시장 일일 분석 대시보드">
<title>AI 금융 분석 대시보드</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a0e17'/%3E%3Cpolyline points='4,24 10,14 16,18 22,8 28,12' fill='none' stroke='%2306b6d4' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='28' cy='12' r='2' fill='%2310b981'/%3E%3C/svg%3E">

<style>
/* ─── Reset & Base ─────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:           #0a0e17;
  --surface:      #111827;
  --surface-hi:   #162032;
  --border:       rgba(6,182,212,0.12);
  --border-hi:    rgba(6,182,212,0.28);
  --cyan:         #06b6d4;
  --cyan-dim:     rgba(6,182,212,0.15);
  --green:        #10b981;
  --green-dim:    rgba(16,185,129,0.15);
  --red:          #ef4444;
  --red-dim:      rgba(239,68,68,0.15);
  --amber:        #f59e0b;
  --amber-dim:    rgba(245,158,11,0.15);
  --orange:       #f97316;
  --orange-dim:   rgba(249,115,22,0.15);
  --text:         #cbd5e1;
  --text-muted:   #475569;
  --text-bright:  #f1f5f9;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
          "Noto Sans KR", "Malgun Gothic", sans-serif;
  --font-mono: "SF Mono", "Fira Code", "Consolas", "Menlo", monospace;
  --radius:  10px;
  --radius-sm: 6px;
  --shadow:  0 4px 24px rgba(0,0,0,0.4);
  --row-even: rgba(255,255,255,0.02);
}

html { font-size: 18px; scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* Subtle grid texture */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(6,182,212,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(6,182,212,0.02) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

/* ─── Layout ───────────────────────────────────────────── */
.shell {
  position: relative;
  z-index: 1;
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 20px 48px;
}

/* ─── Header ───────────────────────────────────────────── */
.header {
  padding: 24px 0 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}

.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.brand-icon {
  width: 40px; height: 40px;
  background: var(--cyan-dim);
  border: 1px solid var(--border-hi);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.brand-icon svg { width: 22px; height: 22px; }

.brand-title {
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: -0.02em;
  line-height: 1.2;
}

.brand-sub {
  font-size: 0.78rem;
  color: var(--cyan);
  font-family: var(--font-mono);
  letter-spacing: 0.08em;
  margin-top: 2px;
}

.header-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}

.live-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(16,185,129,0.1);
  border: 1px solid rgba(16,185,129,0.3);
  color: var(--green);
  font-size: 0.75rem;
  font-family: var(--font-mono);
  font-weight: 600;
  letter-spacing: 0.12em;
  padding: 4px 12px;
  border-radius: 20px;
}

.live-dot {
  width: 6px; height: 6px;
  background: var(--green);
  border-radius: 50%;
  animation: pulse-dot 2s infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.4; transform: scale(0.7); }
}

.meta-date {
  font-size: 0.85rem;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

.meta-time {
  font-size: 0.78rem;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

/* ─── Section Label ────────────────────────────────────── */
.section-label {
  font-size: 0.78rem;
  font-family: var(--font-mono);
  font-weight: 600;
  letter-spacing: 0.14em;
  color: var(--cyan);
  text-transform: uppercase;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ─── Macro Cards ──────────────────────────────────────── */
.macro-section { margin-bottom: 32px; }

.macro-scroll {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.macro-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s;
}

.macro-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--cyan), transparent);
  opacity: 0.6;
}

.macro-card:hover { border-color: var(--border-hi); }

.macro-icon {
  width: 32px; height: 32px;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 12px;
  font-size: 1rem;
}

.macro-icon.cycle { background: var(--cyan-dim); }
.macro-icon.rate  { background: var(--green-dim); }
.macro-icon.infl  { background: var(--amber-dim); }

.macro-label {
  font-size: 0.78rem;
  font-family: var(--font-mono);
  color: var(--text-muted);
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}

.macro-value {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: -0.01em;
  line-height: 1.2;
}

.macro-sub {
  font-size: 0.82rem;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ─── Sector Cards ─────────────────────────────────────── */
.sectors-section { display: flex; flex-direction: column; gap: 16px; }

.sector-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}

.sector-header {
  padding: 14px 18px;
  background: var(--surface-hi);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.sector-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--cyan);
  flex-shrink: 0;
}

.sector-name {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: -0.01em;
}

.sector-count {
  margin-left: auto;
  font-size: 0.78rem;
  font-family: var(--font-mono);
  color: var(--text-muted);
  background: rgba(255,255,255,0.05);
  padding: 3px 10px;
  border-radius: 20px;
}

/* ─── Stock Table ──────────────────────────────────────── */
.stock-table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

.stock-table thead th {
  font-size: 0.7rem;
  font-family: var(--font-mono);
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.25);
  white-space: nowrap;
  text-align: left;
  overflow: hidden;
}

/* Column widths — desktop 7 columns */
.stock-table .col-name   { width: 22%; }
.stock-table .col-regime { width: 10%; text-align: center; }
.stock-table .col-sent   { width: 14%; }
.stock-table .col-price  { width: 14%; text-align: right; }
.stock-table .col-mcap   { width: 13%; text-align: right; }
.stock-table .col-per    { width: 12%; text-align: right; }
.stock-table .col-roe    { width: 10%; text-align: right; }
.stock-table .col-arrow  { width: 5%; text-align: center; }

/* Data rows */
.stock-row {
  cursor: pointer;
  transition: background 0.12s;
}

.stock-row:hover {
  background: rgba(6,182,212,0.05);
}

.stock-row.is-open {
  background: rgba(6,182,212,0.07);
}

.stock-row:nth-child(4n+1) {
  background: var(--row-even);
}
.stock-row:nth-child(4n+1):hover {
  background: rgba(6,182,212,0.05);
}

.stock-row td {
  padding: 12px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 0.88rem;
  vertical-align: middle;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Name cell */
.stock-name {
  font-weight: 600;
  color: var(--text-bright);
  line-height: 1.3;
}

.stock-ticker {
  font-size: 0.7rem;
  font-family: var(--font-mono);
  color: var(--text-muted);
  margin-left: 6px;
}

/* Regime badges */
.regime {
  display: inline-block;
  font-size: 0.72rem;
  font-family: var(--font-mono);
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 3px;
  white-space: nowrap;
  line-height: 1.4;
}

.regime-up-strong   { background: rgba(16,185,129,0.2);  color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
.regime-up          { background: rgba(16,185,129,0.12); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.2); }
.regime-up-weak     { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.25); }
.regime-sideways    { background: rgba(245,158,11,0.1);  color: #fcd34d; border: 1px solid rgba(245,158,11,0.2); }
.regime-down-weak   { background: rgba(249,115,22,0.15); color: #fb923c; border: 1px solid rgba(249,115,22,0.25); }
.regime-down        { background: rgba(239,68,68,0.15);  color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
.regime-down-strong { background: rgba(239,68,68,0.22);  color: #fca5a5; border: 1px solid rgba(239,68,68,0.35); }
.regime-unknown     { background: rgba(100,116,139,0.15); color: #94a3b8; border: 1px solid rgba(100,116,139,0.2); }

/* Sentiment */
.sent-label {
  font-size: 0.82rem;
  font-weight: 600;
}

.sent-score {
  font-size: 0.78rem;
  font-family: var(--font-mono);
  font-weight: 500;
  margin-left: 4px;
}

.col-pos  { color: var(--green); }
.col-neg  { color: var(--red); }
.col-neut { color: var(--text-muted); }

/* Numeric cells */
.num {
  font-family: var(--font-mono);
  text-align: right;
  color: var(--text-bright);
}

.num-muted {
  font-family: var(--font-mono);
  text-align: right;
  color: var(--text);
}

/* Expand arrow */
.arrow-cell {
  text-align: center;
  color: var(--text-muted);
  font-size: 0.7rem;
  transition: transform 0.2s;
}

.stock-row.is-open .arrow-cell {
  color: var(--cyan);
}

/* ─── Detail Row (expanded) ────────────────────────────── */
.detail-row {
  display: none;
}

.detail-row.is-visible {
  display: table-row;
}

.detail-row td {
  padding: 0;
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.2);
}

.detail-panel {
  padding: 14px 16px 16px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px 16px;
}

.detail-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.detail-label {
  font-size: 0.72rem;
  font-family: var(--font-mono);
  color: var(--text-muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.detail-value {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--text-bright);
  font-family: var(--font-mono);
}

/* 52w range bar */
.range-bar-wrap {
  grid-column: 1 / -1;
  margin-top: 4px;
}

.range-label-row {
  display: flex;
  justify-content: space-between;
  font-size: 0.72rem;
  font-family: var(--font-mono);
  color: var(--text-muted);
  margin-bottom: 4px;
}

.range-track {
  height: 4px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  position: relative;
  overflow: visible;
}

.range-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), var(--green));
  border-radius: 2px;
}

.range-current {
  position: absolute;
  top: -3px;
  width: 10px; height: 10px;
  background: var(--text-bright);
  border-radius: 50%;
  transform: translateX(-50%);
  box-shadow: 0 0 6px rgba(255,255,255,0.4);
}

/* ─── Loading / Error ──────────────────────────────────── */
.state-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 20px;
  text-align: center;
}

.spinner {
  width: 40px; height: 40px;
  border: 2px solid var(--border);
  border-top-color: var(--cyan);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.state-label {
  font-size: 0.84rem;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

.error-icon { font-size: 2.5rem; line-height: 1; }
.error-title { font-size: 1rem; font-weight: 700; color: var(--red); }
.error-msg {
  font-size: 0.78rem;
  color: var(--text-muted);
  font-family: var(--font-mono);
  max-width: 320px;
}

/* ─── Footer ───────────────────────────────────────────── */
.footer {
  margin-top: 48px;
  padding: 20px 0;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}

.footer-brand {
  font-size: 0.82rem;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

.footer-brand span { color: var(--cyan); }

.footer-time {
  font-size: 0.78rem;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

/* ─── Mobile: hide columns, show compact cards ─────────── */
@media (max-width: 768px) {
  .shell { padding: 0 12px 32px; }

  .macro-scroll {
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .macro-card { padding: 12px; }
  .macro-icon { width: 28px; height: 28px; margin-bottom: 8px; font-size: 0.85rem; }
  .macro-value { font-size: 1rem; }

  /* Hide desktop-only columns */
  .stock-table .hide-mobile {
    display: none;
  }

  .stock-table { table-layout: auto; }

  .stock-table .col-name   { width: auto; }
  .stock-table .col-regime { width: auto; }
  .stock-table .col-price  { width: auto; }
  .stock-table .col-arrow  { width: 28px; }

  .stock-table thead th { padding: 8px 8px; font-size: 0.68rem; }
  .stock-row td { padding: 10px 8px; font-size: 0.85rem; }

  .sector-header { padding: 10px 12px; }
  .sector-name { font-size: 0.92rem; }

  .detail-panel { padding: 10px 12px; gap: 8px 12px; grid-template-columns: repeat(2, 1fr); }

  .brand-title { font-size: 1.1rem; }

  .footer { flex-direction: column; align-items: flex-start; }

  /* Mobile: show sent below name */
  .mobile-sent {
    display: block;
    font-size: 0.78rem;
    margin-top: 2px;
  }
}

@media (min-width: 769px) {
  .mobile-sent { display: none; }
}

@media (max-width: 400px) {
  .macro-scroll { grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .macro-card { padding: 10px; }
  .macro-value { font-size: 0.92rem; }
  .macro-sub { font-size: 0.75rem; }
  .macro-label { font-size: 0.7rem; }
}

</style>
</head>
<body>

<div class="shell">

  <!-- Header -->
  <header class="header">
    <div class="header-top">
      <div class="header-brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </div>
        <div>
          <div class="brand-title">AI 금융 분석 대시보드</div>
          <div class="brand-sub" id="header-date">로딩 중...</div>
        </div>
      </div>
      <div class="header-meta">
        <span class="live-badge">
          <span class="live-dot"></span>
          LIVE
        </span>
        <span class="meta-date" id="meta-date"></span>
        <span class="meta-time" id="meta-time"></span>
      </div>
    </div>
  </header>

  <!-- Main content area -->
  <main id="main-content">
    <div class="state-screen" id="loading-screen">
      <div class="spinner"></div>
      <p class="state-label">데이터를 불러오는 중...</p>
    </div>
  </main>

</div>

<script>
/* ─── Utilities ────────────────────────────────────────── */
function esc(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtPrice(v, isCrypto) {
  if (v == null || v === 'N/A' || isNaN(Number(v))) return 'N/A';
  var n = Number(v);
  if (isCrypto) {
    if (n >= 1000) return '$' + n.toLocaleString('en-US', {maximumFractionDigits: 0});
    if (n >= 1) return '$' + n.toFixed(2);
    return '$' + n.toFixed(4);
  }
  return n.toLocaleString('ko-KR') + '원';
}

function fmtMarketCap(v, isCrypto) {
  if (v == null || v === 'N/A' || isNaN(Number(v))) return 'N/A';
  var n = Number(v);
  if (isCrypto) {
    if (n >= 10000) return '$' + (n / 10000).toFixed(1) + 'T';
    return '$' + Math.round(n).toLocaleString('en-US') + 'B';
  }
  if (n >= 10000) return (n / 10000).toFixed(1) + '조';
  return Math.round(n).toLocaleString('ko-KR') + '억';
}

function fmtNum(v, d) {
  if (d === undefined) d = 2;
  if (v == null || v === 'N/A' || isNaN(Number(v))) return 'N/A';
  return Number(v).toFixed(d);
}

function fmtPct(v) {
  if (v == null || v === 'N/A' || isNaN(Number(v))) return 'N/A';
  var n = Number(v);
  return (n > 0 ? '+' : '') + n.toFixed(1) + '%';
}

function sentColor(score) {
  if (score == null || isNaN(Number(score))) return 'col-neut';
  var n = Number(score);
  if (n > 5)  return 'col-pos';
  if (n < -5) return 'col-neg';
  return 'col-neut';
}

function sentLabelColor(label) {
  if (!label) return 'col-neut';
  if (/긍정|낙관|탐욕/.test(label)) return 'col-pos';
  if (/부정|약세|공포|하락/.test(label)) return 'col-neg';
  return 'col-neut';
}

function regimeClass(r) {
  if (!r) return 'regime-unknown';
  var map = {
    '강한상승': 'regime-up-strong',
    '상승':     'regime-up',
    '약한상승': 'regime-up-weak',
    '횡보':     'regime-sideways',
    '약한하락': 'regime-down-weak',
    '하락':     'regime-down',
    '강한하락': 'regime-down-strong'
  };
  return map[r] || 'regime-unknown';
}

function rangePos(price, low, high) {
  if (!price || !low || !high || high === low) return null;
  return Math.max(0, Math.min(100, ((price - low) / (high - low)) * 100));
}

function isCryptoTicker(ticker) {
  return ticker && ticker.includes('-');
}

function parseScore(s) {
  if (s == null || s === '' || s === 'N/A') return null;
  var n = parseFloat(String(s).replace('+', ''));
  return isNaN(n) ? null : n;
}

/* ─── Build Macro Section ──────────────────────────────── */
function buildMacro(macro) {
  var cycle = (macro && macro.cycle) || 'N/A';
  var rate  = (macro && macro.rate)  || 'N/A';
  var ffr   = (macro && macro.ffr)   || 'N/A';
  var infl  = (macro && macro.inflation) || 'N/A';
  var cpi   = (macro && macro.cpi)   || 'N/A';

  return '<div class="macro-section">' +
    '<p class="section-label">매크로 환경</p>' +
    '<div class="macro-scroll">' +

    '<div class="macro-card">' +
      '<div class="macro-icon cycle">📈</div>' +
      '<p class="macro-label">경기 사이클</p>' +
      '<p class="macro-value">' + esc(cycle) + '</p>' +
    '</div>' +

    '<div class="macro-card">' +
      '<div class="macro-icon rate">🏦</div>' +
      '<p class="macro-label">금리 국면</p>' +
      '<p class="macro-value">' + esc(rate) + '</p>' +
      '<p class="macro-sub">FFR ' + esc(ffr) + '</p>' +
    '</div>' +

    '<div class="macro-card">' +
      '<div class="macro-icon infl">📊</div>' +
      '<p class="macro-label">인플레이션</p>' +
      '<p class="macro-value">' + esc(infl) + '</p>' +
      '<p class="macro-sub">CPI ' + esc(cpi) + '</p>' +
    '</div>' +

    '</div></div>';
}

/* ─── Build Stock Table Rows ───────────────────────────── */
function buildStockRows(stock, idx, colCount) {
  var name    = stock.name    || '—';
  var ticker  = stock.ticker  || '';
  var regime  = stock.regime  || '—';
  var sentLbl = stock.sentiment_label || '—';
  var sentScr = stock.sentiment_score;
  var price   = stock.price;
  var mcap    = stock.market_cap;
  var fper    = stock.forward_per;
  var roe     = stock.roe;
  var revGrow = stock.revenue_growth;
  var hi52    = stock.high_52w;
  var lo52    = stock.low_52w;
  var crypto  = isCryptoTicker(ticker);

  var scoreNum = parseScore(sentScr);
  var scoreDisp = scoreNum !== null
    ? (scoreNum >= 0 ? '+' : '') + scoreNum.toFixed(1)
    : 'N/A';
  var sCls  = sentColor(scoreNum);
  var slCls = sentLabelColor(sentLbl);
  var rPos  = rangePos(price, lo52, hi52);

  var rowId = 'row-' + idx;
  var detId = 'det-' + idx;

  // Main row
  var html = '<tr class="stock-row" data-detail="' + detId + '" id="' + rowId + '" onclick="toggleDetail(\'' + detId + '\',\'' + rowId + '\')">';

  // Name + ticker, plus mobile sentiment inline
  html += '<td class="col-name">';
  html += '<span class="stock-name">' + esc(name) + '</span>';
  html += '<span class="stock-ticker">' + esc(ticker) + '</span>';
  html += '<span class="mobile-sent"><span class="' + slCls + '">' + esc(sentLbl) + '</span> <span class="' + sCls + '">' + esc(scoreDisp) + '</span></span>';
  html += '</td>';

  // Regime
  html += '<td class="col-regime"><span class="regime ' + regimeClass(regime) + '">' + esc(regime) + '</span></td>';

  // Sentiment (desktop only)
  html += '<td class="col-sent hide-mobile"><span class="sent-label ' + slCls + '">' + esc(sentLbl) + '</span><span class="sent-score ' + sCls + '">' + esc(scoreDisp) + '</span></td>';

  // Price
  html += '<td class="col-price num">' + fmtPrice(price, crypto) + '</td>';

  // Market cap (desktop)
  html += '<td class="col-mcap num-muted hide-mobile">' + fmtMarketCap(mcap, crypto) + '</td>';

  // PER (desktop)
  html += '<td class="col-per num-muted hide-mobile">' + fmtNum(fper) + '</td>';

  // ROE (desktop)
  html += '<td class="col-roe num-muted hide-mobile">' + fmtNum(roe) + '%</td>';

  // Arrow
  html += '<td class="col-arrow arrow-cell">&#9662;</td>';

  html += '</tr>';

  // Detail row
  html += '<tr class="detail-row" id="' + detId + '"><td colspan="' + colCount + '">';
  html += '<div class="detail-panel">';

  html += '<div class="detail-item"><span class="detail-label">시가총액</span><span class="detail-value">' + fmtMarketCap(mcap, crypto) + '</span></div>';
  html += '<div class="detail-item"><span class="detail-label">Forward PER</span><span class="detail-value">' + fmtNum(fper) + 'x</span></div>';
  html += '<div class="detail-item"><span class="detail-label">ROE</span><span class="detail-value">' + fmtNum(roe) + '%</span></div>';
  html += '<div class="detail-item"><span class="detail-label">매출성장률</span><span class="detail-value">' + fmtPct(revGrow) + '</span></div>';

  if (rPos !== null) {
    html += '<div class="range-bar-wrap">';
    html += '<div class="range-label-row"><span>52주 저가 ' + fmtPrice(lo52, crypto) + '</span><span>고가 ' + fmtPrice(hi52, crypto) + '</span></div>';
    html += '<div class="range-track"><div class="range-fill" style="width:' + rPos.toFixed(1) + '%"></div><div class="range-current" style="left:' + rPos.toFixed(1) + '%"></div></div>';
    html += '</div>';
  }

  html += '</div></td></tr>';

  return html;
}

/* ─── Build Sector Card ────────────────────────────────── */
var globalIdx = 0;

function buildSectorCard(sector) {
  var sName  = (sector.name || sector['섹터'] || '기타');
  var stocks = sector.stocks || [];
  var colCount = 8; // name, regime, sent, price, mcap, per, roe, arrow

  var rowsHTML = '';
  for (var i = 0; i < stocks.length; i++) {
    rowsHTML += buildStockRows(stocks[i], globalIdx, colCount);
    globalIdx++;
  }

  return '<div class="sector-card">' +
    '<div class="sector-header">' +
      '<span class="sector-dot"></span>' +
      '<span class="sector-name">' + esc(sName) + '</span>' +
      '<span class="sector-count">' + stocks.length + '종목</span>' +
    '</div>' +
    '<div style="overflow-x:auto">' +
    '<table class="stock-table">' +
      '<thead><tr>' +
        '<th class="col-name">종목</th>' +
        '<th class="col-regime">레짐</th>' +
        '<th class="col-sent hide-mobile">심리</th>' +
        '<th class="col-price" style="text-align:right">주가</th>' +
        '<th class="col-mcap hide-mobile" style="text-align:right">시총</th>' +
        '<th class="col-per hide-mobile" style="text-align:right">PER</th>' +
        '<th class="col-roe hide-mobile" style="text-align:right">ROE</th>' +
        '<th class="col-arrow"></th>' +
      '</tr></thead>' +
      '<tbody>' + rowsHTML + '</tbody>' +
    '</table>' +
    '</div>' +
  '</div>';
}

/* ─── Toggle Detail Row ────────────────────────────────── */
function toggleDetail(detId, rowId) {
  var det = document.getElementById(detId);
  var row = document.getElementById(rowId);
  if (!det || !row) return;
  var open = det.classList.contains('is-visible');
  if (open) {
    det.classList.remove('is-visible');
    row.classList.remove('is-open');
  } else {
    det.classList.add('is-visible');
    row.classList.add('is-open');
  }
}

/* ─── Render ───────────────────────────────────────────── */
function render(data) {
  var dateStr = data.date || '';
  var genAt   = data.generated_at || '';

  document.getElementById('header-date').textContent =
    dateStr ? dateStr + ' 분석 보고서' : 'AI 분석 보고서';

  if (dateStr) document.getElementById('meta-date').textContent = dateStr;
  if (genAt)   document.getElementById('meta-time').textContent = '생성: ' + genAt;

  globalIdx = 0;

  var macroHTML   = buildMacro(data.macro || {});
  var sectors     = data.sectors || [];
  var sectorsHTML = '';
  for (var i = 0; i < sectors.length; i++) {
    sectorsHTML += buildSectorCard(sectors[i]);
  }

  var footerHTML =
    '<footer class="footer">' +
      '<p class="footer-brand">Powered by <span>AI Finance Analysis System</span></p>' +
      '<p class="footer-time">업데이트: ' + esc(genAt || dateStr || '—') + '</p>' +
    '</footer>';

  document.getElementById('main-content').innerHTML =
    macroHTML +
    '<p class="section-label">섹터별 종목 분석</p>' +
    '<div class="sectors-section">' + sectorsHTML + '</div>' +
    footerHTML;
}

/* ─── Error State ──────────────────────────────────────── */
function showError(msg) {
  document.getElementById('main-content').innerHTML =
    '<div class="state-screen">' +
      '<div class="error-icon">⚠️</div>' +
      '<p class="error-title">데이터를 불러올 수 없습니다</p>' +
      '<p class="error-msg">' + esc(msg) + '</p>' +
    '</div>';
}

/* ─── Load Data ────────────────────────────────────────── */
async function loadData() {
  try {
    var res = await fetch('data.json');
    if (!res.ok) throw new Error('HTTP ' + res.status + ': ' + res.statusText);
    var data = await res.json();
    render(data);
  } catch (err) {
    showError(err.message || String(err));
  }
}

loadData();
</script>
</body>
</html>
